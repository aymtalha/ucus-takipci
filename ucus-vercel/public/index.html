<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>✈️ Uçuş Fiyat Takipçisi</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0d1117;color:#e6edf3;font-family:'Outfit',sans-serif;min-height:100vh;}
input,button,select{font-family:'Outfit',sans-serif;}
input::placeholder{color:#4a5568;}
button{cursor:pointer;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:#161b22;}
::-webkit-scrollbar-thumb{background:#30363d;border-radius:2px;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.app{max-width:500px;margin:0 auto;padding:20px 16px 80px;}
.card{background:#161b22;border:1px solid #21262d;border-radius:16px;padding:20px;margin-bottom:16px;animation:fadeIn 0.3s ease;}
.card.drop{border-color:rgba(16,185,129,0.5);}
.stat-box{background:#0d1117;border-radius:12px;padding:12px 14px;flex:1;}
.stat-label{color:#8b949e;font-size:11px;margin-bottom:4px;}
.stat-val{font-family:'DM Mono',monospace;font-weight:700;font-size:19px;}
.btn-primary{background:linear-gradient(135deg,#3b82f6,#1d4ed8);border:none;border-radius:10px;padding:13px;color:#fff;font-weight:700;font-size:15px;width:100%;box-shadow:0 4px 15px rgba(59,130,246,0.3);transition:opacity .2s;display:block;text-align:center;}
.btn-primary:hover{opacity:.9;}
.btn-secondary{background:#0d1117;border:1px solid #30363d;color:#8b949e;border-radius:8px;padding:7px 11px;font-size:12px;transition:border-color .2s;}
.btn-secondary:hover{border-color:#4a5568;}
.field{background:#0d1117;border:1px solid #30363d;border-radius:10px;padding:12px 14px;color:#e6edf3;font-size:14px;width:100%;outline:none;transition:border-color .2s;}
.field:focus{border-color:#3b82f6;}
.tabs{display:flex;gap:4px;background:#161b22;border-radius:12px;padding:4px;margin-bottom:20px;}
.tab{flex:1;padding:10px;border-radius:9px;border:none;background:transparent;color:#8b949e;font-weight:600;font-size:14px;cursor:pointer;transition:all .2s;}
.tab.active{background:#3b82f6;color:#fff;}
.mono{font-family:'DM Mono',monospace;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px;overflow-y:auto;}
.modal{background:#161b22;border:1px solid #30363d;border-radius:20px;padding:24px;width:100%;max-width:440px;animation:fadeIn .3s ease;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1c2333;border-radius:12px;padding:12px 20px;color:#e6edf3;font-size:13px;font-weight:500;box-shadow:0 8px 32px rgba(0,0,0,.6);animation:fadeIn .25s ease;z-index:9998;pointer-events:none;max-width:90vw;text-align:center;}
.loading-row{text-align:center;padding:24px 0;animation:pulse 1.5s infinite;color:#4a5568;}
.drop-badge{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:10px;padding:8px 12px;margin-bottom:14px;display:flex;align-items:center;gap:8px;color:#10b981;font-size:13px;font-weight:600;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.sbadge{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;background:#3b82f6;border-radius:50%;color:#fff;font-size:11px;font-weight:700;margin-right:6px;flex-shrink:0;vertical-align:middle;}
a{color:#3b82f6;text-decoration:none;}a:hover{text-decoration:underline;}
.flight-row{background:#0d1117;border-radius:10px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
</style>
</head>
<body>
<div class="app">
  <div id="modal-container"></div>
  <div id="toast-container"></div>
  <div id="root"></div>
</div>
<script>
const PROXY = "";

const S={
  get(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
};

const state={
  routes: S.get("serp-routes")||[],
  history: S.get("serp-history")||{},
  flightDetails: S.get("serp-details")||{},
  settings: S.get("serp-settings")||{botToken:"",chatId:""},
  serpApiKey: S.get("serp-apikey")||"",
  view: "routes",
  loadingRoute: null,
  form:{
    origin:"IST", destination:"",
    date:(()=>{const d=new Date();d.setDate(d.getDate()+14);return d.toISOString().split("T")[0];})(),
    currency:"TRY"
  },
  settingsForm: S.get("serp-settings")||{botToken:"",chatId:""},
};

function setState(p){Object.assign(state,p);render();}

function getStats(id){
  const h=state.history[id]||[];
  if(!h.length)return{current:null,avg7:null,change:null,chartData:[]};
  const current=h[h.length-1].price;
  const last7=h.slice(-7);
  const avg7=Math.round(last7.reduce((s,x)=>s+x.price,0)/last7.length);
  const prev=h.length>1?h[h.length-2].price:current;
  const change=parseFloat(((current-prev)/prev*100).toFixed(1));
  const chartData=h.map(x=>({t:new Date(x.date).toLocaleDateString("tr-TR",{day:"2-digit",month:"2-digit"}),price:x.price}));
  return{current,avg7,change,chartData};
}
function sym(c){return c==="TRY"?"₺":c==="USD"?"$":c==="EUR"?"€":"₺";}

let toastTimer;
function showToast(msg,type){
  type=type||"info";
  const colors={info:"#3b82f6",success:"#10b981",error:"#ef4444",warn:"#f59e0b"};
  document.getElementById("toast-container").innerHTML=
    '<div class="toast" style="border:1px solid '+colors[type]+'44;border-left:3px solid '+colors[type]+'">'+msg+'</div>';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{document.getElementById("toast-container").innerHTML="";},4500);
}

function showKeyModal(){
  document.getElementById("modal-container").innerHTML=
    '<div class="modal-bg" onclick="if(event.target===this)closeModal()">'
    +'<div class="modal">'
    +'<div style="font-weight:800;font-size:18px;margin-bottom:4px">🔑 SerpApi Key</div>'
    +'<div style="color:#4a5568;font-size:12px;margin-bottom:16px">Google Flights verisi · 100 sorgu/ay ücretsiz</div>'
    +'<div style="background:#0d1117;border-radius:12px;padding:14px;margin-bottom:16px">'
    +'<div style="color:#8b949e;font-size:12px;font-weight:600;margin-bottom:10px">📋 Nasıl alınır?</div>'
    +'<div style="font-size:12px;color:#8b949e;line-height:2.1">'
    +'<span class="sbadge">1</span><a href="https://serpapi.com/users/sign_up" target="_blank">serpapi.com</a> → ücretsiz kayıt ol<br>'
    +'<span class="sbadge">2</span>Dashboard → sol menü → <b style="color:#e6edf3">API Key</b><br>'
    +'<span class="sbadge">3</span>Key\'i kopyala → aşağıya yapıştır'
    +'</div></div>'
    +'<div style="margin-bottom:16px">'
    +'<div style="color:#8b949e;font-size:12px;margin-bottom:6px">API Key</div>'
    +'<input id="serp-key-input" class="field mono" type="password" placeholder="abc123..." value="'+state.serpApiKey+'"/>'
    +'</div>'
    +'<div style="display:flex;gap:10px">'
    +'<button class="btn-secondary" style="flex:1;padding:12px;font-size:14px;font-weight:600" onclick="closeModal()">İptal</button>'
    +'<button class="btn-primary" style="padding:12px;font-size:14px;width:auto;flex:1" onclick="saveKey()">💾 Kaydet</button>'
    +'</div></div></div>';
}
function closeModal(){document.getElementById("modal-container").innerHTML="";}
function saveKey(){
  const v=document.getElementById("serp-key-input").value.trim();
  if(!v){showToast("⚠️ API key gir","warn");return;}
  state.serpApiKey=v; S.set("serp-apikey",v);
  closeModal(); showToast("✅ API key kaydedildi!","success"); render();
}

async function fetchSerpFlight(route){
  const params=new URLSearchParams({
    engine:"google_flights",
    departure_id:route.origin,
    arrival_id:route.destination,
    outbound_date:route.date,
    type:"2", travel_class:"1",
    currency:route.currency||"TRY",
    hl:"tr", gl:"tr", adults:"1",
    api_key:state.serpApiKey
  });
  const res=await fetch(PROXY+"/api/flights?"+params.toString());
  if(!res.ok)throw new Error("Sunucu hatası: HTTP "+res.status);
  const data=await res.json();
  if(data.error)throw new Error(data.error);
  const all=[...(data.best_flights||[]),...(data.other_flights||[])];
  if(!all.length)return null;
  all.sort((a,b)=>a.price-b.price);
  const best=all[0];
  return{
    price:best.price,
    airline:(best.flights[0]&&best.flights[0].airline)||"",
    airlineLogo:best.airline_logo||"",
    duration:best.total_duration,
    stops:best.flights.length-1,
    flightNumber:(best.flights[0]&&best.flights[0].flight_number)||"",
    departTime:(best.flights[0]&&best.flights[0].departure_airport&&best.flights[0].departure_airport.time)||"",
    arriveTime:(best.flights[best.flights.length-1]&&best.flights[best.flights.length-1].arrival_airport&&best.flights[best.flights.length-1].arrival_airport.time)||"",
    googleFlightsUrl:(data.search_metadata&&data.search_metadata.google_flights_url)||""
  };
}

function svgChart(chartData){
  if(chartData.length<2)return '<div style="color:#4a5568;font-size:12px;text-align:center;padding:10px 0">Grafik için birden fazla güncelleme gerekli</div>';
  const W=420,H=100,PL=60,PR=8,PT=8,PB=20;
  const prices=chartData.map(d=>d.price);
  const minP=Math.min(...prices),maxP=Math.max(...prices);
  const range=maxP-minP||1;
  const IW=W-PL-PR,IH=H-PT-PB;
  const toX=i=>PL+i/(chartData.length-1)*IW;
  const toY=p=>PT+(1-(p-minP)/range)*IH;
  const pts=chartData.map((d,i)=>[toX(i),toY(d.price)]);
  const poly=pts.map(p=>p[0]+","+p[1]).join(" ");
  const fill="M"+pts[0][0]+","+pts[0][1]+" L"+pts.map(p=>p[0]+","+p[1]).join(" L")+" L"+pts[pts.length-1][0]+","+(PT+IH)+" L"+pts[0][0]+","+(PT+IH)+" Z";
  const yTicks=[0,0.5,1].map(t=>{
    const val=Math.round(minP+t*range); const y=toY(val);
    return '<line x1="'+PL+'" y1="'+y+'" x2="'+(W-PR)+'" y2="'+y+'" stroke="#21262d" stroke-dasharray="3,3"/>'
      +'<text x="'+(PL-4)+'" y="'+(y+3)+'" fill="#4a5568" font-size="8" text-anchor="end" font-family="monospace">'+(val>=1000?Math.round(val/1000)+"k":val)+'</text>';
  }).join("");
  const step=Math.max(1,Math.ceil(chartData.length/4));
  const xLabels=chartData.map((d,i)=>{
    if(i%step!==0&&i!==chartData.length-1)return "";
    return '<text x="'+toX(i)+'" y="'+(H-4)+'" fill="#4a5568" font-size="8" text-anchor="middle" font-family="monospace">'+d.t+'</text>';
  }).join("");
  const dots=pts.map((p,i)=>'<circle cx="'+p[0]+'" cy="'+p[1]+'" r="3.5" fill="#3b82f6" stroke="#0d1117" stroke-width="1.5"><title>'+chartData[i].t+': '+chartData[i].price.toLocaleString("tr-TR")+'</title></circle>').join("");
  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="overflow:visible;margin-top:8px;display:block">'
    +'<defs><linearGradient id="gf" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3b82f6" stop-opacity="0.2"/><stop offset="100%" stop-color="#3b82f6" stop-opacity="0.01"/></linearGradient></defs>'
    +yTicks+'<path d="'+fill+'" fill="url(#gf)"/>'
    +'<polyline points="'+poly+'" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linejoin="round"/>'
    +dots+xLabels+'</svg>';
}

function addRoute(){
  const{origin,destination,date,currency}=state.form;
  if(!origin||!destination||!date){showToast("⚠️ Tüm alanları doldur","warn");return;}
  if(!state.serpApiKey){showKeyModal();return;}
  const route={id:Date.now().toString(),origin:origin.trim().toUpperCase(),destination:destination.trim().toUpperCase(),date,currency:currency||"TRY"};
  state.routes=[...state.routes,route]; S.set("serp-routes",state.routes);
  state.form={...state.form,destination:""}; render();
  showToast("✈️ Rota eklendi, Google Flights'tan çekiliyor...","info");
  fetchPrice(route);
}
function deleteRoute(id){
  state.routes=state.routes.filter(r=>r.id!==id); S.set("serp-routes",state.routes);
  delete state.history[id]; delete state.flightDetails[id];
  S.set("serp-history",state.history); S.set("serp-details",state.flightDetails); render();
}
async function fetchPrice(route){
  if(!state.serpApiKey){showKeyModal();return;}
  state.loadingRoute=route.id; render();
  try{
    const result=await fetchSerpFlight(route);
    if(result&&result.price>0){
      if(!state.history[route.id])state.history[route.id]=[];
      state.history[route.id]=[...state.history[route.id].slice(-29),{date:new Date().toISOString(),price:result.price}];
      S.set("serp-history",state.history);
      state.flightDetails[route.id]=result; S.set("serp-details",state.flightDetails);
      const hist=state.history[route.id];
      const avg7=Math.round(hist.slice(-7).reduce((s,h)=>s+h.price,0)/Math.min(hist.length,7));
      if(hist.length>=2&&result.price<avg7*0.95)sendTelegramAlert(route,result,avg7);
      showToast("💰 "+route.origin+"→"+route.destination+": "+result.price.toLocaleString("tr-TR")+sym(route.currency),"success");
    }else{showToast("⚠️ Bu rota için uçuş bulunamadı","warn");}
  }catch(e){
    if(e.message.includes("fetch")||e.message.includes("Failed")){
      showToast("❌ Sunucuya bağlanılamadı — BAŞLAT.bat dosyasını çalıştırıyor musun?","error");
    }else{showToast("❌ "+e.message,"error");}
  }
  state.loadingRoute=null; render();
}
async function refreshAll(){for(var i=0;i<state.routes.length;i++)await fetchPrice(state.routes[i]);}

async function sendTelegramAlert(route,result,avg){
  const{botToken,chatId}=state.settings;
  if(!botToken||!chatId)return;
  const savings=Math.round((avg-result.price)/avg*100);
  const s=sym(route.currency);
  const msg="🚨 FİYAT DÜŞTÜ!\n\n✈️ "+route.origin+" → "+route.destination
    +"\n💰 Şu anki: "+result.price.toLocaleString("tr-TR")+s
    +"\n📊 Ortalama: "+avg.toLocaleString("tr-TR")+s
    +"\n🎉 Tasarruf: %"+savings
    +(result.airline?"\n✈️ "+result.airline:"")
    +(result.stops===0?"\n🟢 Direkt uçuş":"\n🔵 "+result.stops+" aktarma")
    +"\n📅 "+new Date(route.date).toLocaleDateString("tr-TR")
    +(result.googleFlightsUrl?"\n🔗 "+result.googleFlightsUrl:"")
    +"\n\n⚡ Hemen rezervasyon yap!";
  try{await fetch("https://api.telegram.org/bot"+botToken+"/sendMessage",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({chat_id:chatId,text:msg})});}catch{}
}
async function sendDailyReport(){
  const{botToken,chatId}=state.settings;
  if(!botToken||!chatId){showToast("⚠️ Önce Telegram ayarlarını kaydet","warn");return;}
  const now=new Date().toLocaleString("tr-TR",{weekday:"long",day:"numeric",month:"long",year:"numeric",hour:"2-digit",minute:"2-digit"});
  let msg="📊 Günlük Fiyat Raporu\n⏰ "+now+"\n\n";
  state.routes.forEach(r=>{
    const st=getStats(r.id); const det=state.flightDetails[r.id]; const s=sym(r.currency);
    if(st.current){msg+="✈️ "+r.origin+" → "+r.destination+"\n📅 "+new Date(r.date).toLocaleDateString("tr-TR")+"\n💰 "+st.current.toLocaleString("tr-TR")+s+"\n📊 7g ort: "+(st.avg7?st.avg7.toLocaleString("tr-TR")+s:"-")+"\n"+(det&&det.airline?det.airline+(det.stops===0?" (direkt)":"("+det.stops+" aktarma)")+"\n":"")+"\n";}
  });
  try{const res=await fetch("https://api.telegram.org/bot"+botToken+"/sendMessage",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({chat_id:chatId,text:msg})});if(res.ok)showToast("📨 Rapor Telegram'a gönderildi!","success");else showToast("❌ Telegram hatası","error");}
  catch{showToast("❌ Bağlantı hatası","error");}
}
async function testTelegram(){
  const{botToken,chatId}=state.settingsForm;
  if(!botToken||!chatId){showToast("⚠️ Token ve Chat ID gir","warn");return;}
  try{const r=await fetch("https://api.telegram.org/bot"+botToken+"/sendMessage",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({chat_id:chatId,text:"✅ Bağlantı Başarılı!\n\n✈️ Uçuş Takipçisi aktif!"})});if(r.ok)showToast("✅ Telegram başarılı!","success");else showToast("❌ Hatalı token","error");}catch{showToast("❌ Bağlantı hatası","error");}
}
function saveSettings(){state.settings={...state.settingsForm};S.set("serp-settings",state.settings);showToast("✅ Ayarlar kaydedildi","success");}

function render(){
  const{routes,history,settings,serpApiKey,view,loadingRoute,form,settingsForm,flightDetails}=state;
  const hasKey=!!serpApiKey;
  let h="";

  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">'
    +'<div style="display:flex;align-items:center;gap:10px">'
    +'<div style="width:38px;height:38px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px">✈️</div>'
    +'<div><div style="font-weight:800;font-size:20px;letter-spacing:-0.5px">Uçuş Takipçisi</div>'
    +'<div style="color:#4a5568;font-size:10px;font-family:\'DM Mono\',monospace">Google Flights · SerpApi</div></div></div>'
    +'<div style="display:flex;gap:6px">'
    +'<button class="btn-secondary" onclick="showKeyModal()" style="color:'+(hasKey?'#10b981':'#f59e0b')+';font-size:12px;padding:6px 10px">'+(hasKey?"🔑 API ✓":"🔑 API Key")+'</button>'
    +(routes.length?'<button class="btn-secondary" onclick="refreshAll()" style="font-size:12px;padding:6px 10px">🔄</button>':"")
    +(settings.botToken&&routes.length?'<button class="btn-secondary" onclick="sendDailyReport()" style="font-size:12px;padding:6px 10px">📨</button>':"")
    +'</div></div>';

  h+='<div class="tabs">'
    +'<button class="tab '+(view==="routes"?"active":"")+'" onclick="setState({view:\'routes\'})">✈️ Rotalar</button>'
    +'<button class="tab '+(view==="settings"?"active":"")+'" onclick="setState({view:\'settings\'})">⚙️ Ayarlar</button>'
    +'</div>';

  if(view==="routes"){
    if(!hasKey){
      h+='<div style="background:linear-gradient(135deg,rgba(59,130,246,.12),rgba(29,78,216,.08));border:1px solid rgba(59,130,246,.25);border-radius:16px;padding:20px;margin-bottom:16px;text-align:center">'
        +'<div style="font-size:32px;margin-bottom:8px">🔑</div>'
        +'<div style="font-weight:700;font-size:15px;margin-bottom:6px">SerpApi Key Gerekli</div>'
        +'<div style="color:#8b949e;font-size:13px;margin-bottom:14px">serpapi.com → ücretsiz 100 sorgu/ay</div>'
        +'<button class="btn-primary" onclick="showKeyModal()" style="max-width:200px;margin:0 auto">🔑 API Key Ekle</button>'
        +'</div>';
    }
    h+='<div class="card">'
      +'<div style="font-weight:700;font-size:17px;margin-bottom:16px">Yeni Rota Ekle</div>'
      +'<div style="display:flex;gap:10px;margin-bottom:12px">'
      +'<input type="text" value="'+form.origin+'" oninput="state.form.origin=this.value" placeholder="IST" maxlength="3" class="field mono" style="text-transform:uppercase;letter-spacing:4px;text-align:center;font-size:18px;padding:12px 8px;flex:1"/>'
      +'<div style="display:flex;align-items:center;color:#3b82f6;font-weight:700;font-size:22px;padding:0 2px">→</div>'
      +'<input type="text" value="'+form.destination+'" oninput="state.form.destination=this.value" placeholder="DPS" maxlength="3" class="field mono" style="text-transform:uppercase;letter-spacing:4px;text-align:center;font-size:18px;padding:12px 8px;flex:1"/>'
      +'</div>'
      +'<div style="display:flex;gap:10px;margin-bottom:14px">'
      +'<input type="date" value="'+form.date+'" oninput="state.form.date=this.value" class="field" style="color-scheme:dark;flex:2"/>'
      +'<select oninput="state.form.currency=this.value" class="field" style="flex:1;cursor:pointer">'
      +'<option value="TRY" '+(form.currency==="TRY"?"selected":"")+'>₺ TRY</option>'
      +'<option value="USD" '+(form.currency==="USD"?"selected":"")+'>$ USD</option>'
      +'<option value="EUR" '+(form.currency==="EUR"?"selected":"")+'>€ EUR</option>'
      +'</select></div>'
      +'<button class="btn-primary" onclick="addRoute()">✈️ Rota Ekle</button>'
      +'</div>';

    if(!routes.length){
      h+='<div style="text-align:center;color:#4a5568;padding:40px 0"><div style="font-size:48px;margin-bottom:12px">✈️</div><div style="font-size:15px;font-weight:500">Henüz rota yok</div><div style="font-size:13px;margin-top:4px">Yukarıdan ilk rotanı ekle</div></div>';
    }

    routes.forEach(function(route){
      const st=getStats(route.id);
      const{current,avg7,change,chartData}=st;
      const isLoading=loadingRoute===route.id;
      const dateStr=new Date(route.date).toLocaleDateString("tr-TR",{day:"2-digit",month:"2-digit",year:"numeric"});
      const isPriceDrop=change!==null&&change<-2;
      const isPriceRise=change!==null&&change>2;
      const det=flightDetails[route.id];
      const s=sym(route.currency);

      h+='<div class="card '+(isPriceDrop?"drop":"")+'">'
        +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">'
        +'<div><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">'
        +'<span class="mono" style="font-weight:700;font-size:22px">'+route.origin+'</span>'
        +'<span style="color:#3b82f6;font-size:18px;font-weight:700">→</span>'
        +'<span class="mono" style="font-weight:700;font-size:22px">'+route.destination+'</span>'
        +'</div><div class="mono" style="color:#4a5568;font-size:12px">'+dateStr+' · '+route.currency+'</div></div>'
        +'<div style="display:flex;gap:6px">'
        +'<button class="btn-secondary" onclick="(function(){var r=state.routes.find(function(x){return x.id===\''+route.id+'\'});if(r)fetchPrice(r);})()" '+(isLoading?'disabled style="opacity:.5"':'')+'>'+( isLoading?"⏳":"🔄")+'</button>'
        +'<button class="btn-secondary" onclick="deleteRoute(\''+route.id+'\')" style="color:#6e7681">🗑️</button>'
        +'</div></div>';

      if(isLoading){
        h+='<div class="loading-row"><div style="font-size:26px;margin-bottom:6px">🔍</div><div style="font-size:13px">Google Flights\'tan fiyat çekiliyor...</div></div>';
      }else if(current){
        h+='<div style="display:flex;gap:12px;margin-bottom:14px">'
          +'<div class="stat-box"><div class="stat-label">En Ucuz Fiyat</div>'
          +'<div class="stat-val">'+current.toLocaleString("tr-TR")+s+'</div>'
          +(change!==null&&change!==0?'<div style="font-size:11px;color:'+(isPriceDrop?"#10b981":isPriceRise?"#ef4444":"#8b949e")+';margin-top:3px">'+(isPriceDrop?"▼":"▲")+' %'+Math.abs(change)+'</div>':"")
          +'</div>'
          +'<div class="stat-box"><div class="stat-label">7 Günlük Ort.</div>'
          +'<div class="stat-val" style="color:#8b949e">'+(avg7?avg7.toLocaleString("tr-TR")+s:"—")+'</div></div></div>';
        if(isPriceDrop)h+='<div class="drop-badge">🎉 Fiyat düştü! Ortalamadan %'+Math.abs(change)+' daha ucuz</div>';
        if(det){
          h+='<div class="flight-row">'
            +(det.airlineLogo?'<img src="'+det.airlineLogo+'" style="height:20px;width:auto;margin-right:8px" onerror="this.style.display=\'none\'">':"")
            +'<div style="flex:1"><div style="font-size:13px;font-weight:600;color:#e6edf3">'+(det.airline||"")
            +(det.flightNumber?' <span class="mono" style="color:#4a5568;font-size:11px">'+det.flightNumber+'</span>':"")+'</div>'
            +(det.departTime||det.arriveTime?'<div class="mono" style="color:#4a5568;font-size:11px;margin-top:2px">'+(det.departTime?det.departTime.split(" ")[1]||"":"")+(det.arriveTime?" → "+(det.arriveTime.split(" ")[1]||""):"")+'</div>':"")
            +'</div><div style="text-align:right">'
            +'<div style="font-size:12px;color:'+(det.stops===0?"#10b981":"#8b949e")+';font-weight:600">'+(det.stops===0?"🟢 Direkt":"🔵 "+det.stops+" aktarma")+'</div>'
            +(det.duration?'<div style="font-size:11px;color:#4a5568;margin-top:1px">'+Math.floor(det.duration/60)+'s '+(det.duration%60)+'d</div>':"")
            +'</div></div>';
          if(det.googleFlightsUrl){
            h+='<a href="'+det.googleFlightsUrl+'" target="_blank" style="display:flex;align-items:center;justify-content:center;gap:6px;background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:8px;font-size:12px;color:#3b82f6;font-weight:600;margin-top:10px;text-decoration:none">🔗 Google Flights\'ta Gör</a>';
          }
        }
        h+=svgChart(chartData);
      }else{
        h+='<div style="text-align:center;padding:16px 0;color:#4a5568"><div style="font-size:13px;margin-bottom:8px">Fiyat verisi yok</div>'
          +'<button onclick="(function(){var r=state.routes.find(function(x){return x.id===\''+route.id+'\'});if(r)fetchPrice(r);})()" style="background:#0d1117;border:1px solid #30363d;color:#3b82f6;border-radius:8px;padding:7px 18px;font-size:13px;font-weight:600;cursor:pointer">Fiyat Çek</button></div>';
      }
      h+='</div>';
    });
  }

  if(view==="settings"){
    const totalPts=Object.values(history).reduce((s,a)=>s+a.length,0);
    const dropCount=routes.filter(r=>{const c=getStats(r.id).change;return c!==null&&c<-2;}).length;
    h+='<div class="card">'
      +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">'
      +'<div style="width:38px;height:38px;background:rgba(59,130,246,.12);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px">🔑</div>'
      +'<div style="flex:1"><div style="font-weight:700;font-size:15px">SerpApi Key</div>'
      +'<div style="color:#4a5568;font-size:12px">Google Flights · 100 sorgu/ay</div></div>'
      +(hasKey?'<span style="color:#10b981;font-size:12px;font-weight:600;background:rgba(16,185,129,.1);padding:4px 10px;border-radius:20px">✓ Aktif</span>':"")
      +'</div>'
      +(hasKey?'<div class="mono" style="background:#0d1117;border-radius:10px;padding:10px 14px;font-size:12px;color:#4a5568;margin-bottom:12px">'+serpApiKey.substring(0,12)+'••••••••</div>':"")
      +'<button class="btn-secondary" onclick="showKeyModal()" style="width:100%;padding:12px;font-size:14px;font-weight:600;text-align:center">'
      +(hasKey?"🔄 Key Güncelle":"➕ API Key Ekle")+'</button></div>';

    h+='<div class="card">'
      +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">'
      +'<div style="width:38px;height:38px;background:rgba(59,130,246,.12);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px">📨</div>'
      +'<div><div style="font-weight:700;font-size:15px">Telegram Bildirimleri</div>'
      +'<div style="color:#4a5568;font-size:12px">Fiyat düşünce anında uyarı al</div></div></div>'
      +'<div style="background:#0d1117;border-radius:12px;padding:14px;margin-bottom:14px">'
      +'<div style="color:#8b949e;font-size:12px;font-weight:600;margin-bottom:8px">📋 Kurulum</div>'
      +'<div style="color:#8b949e;font-size:12px;line-height:1.9">'
      +'<span class="sbadge">1</span>Telegram → <span class="mono" style="color:#e6edf3">@BotFather</span> → <span class="mono" style="color:#e6edf3">/newbot</span><br>'
      +'<span class="sbadge">2</span>Gelen token\'ı kopyala<br>'
      +'<span class="sbadge">3</span><span class="mono" style="color:#e6edf3">@userinfobot</span>\'a yaz → Chat ID al<br>'
      +'<span class="sbadge">4</span>Aşağıya gir → Test Et</div></div>'
      +'<div style="margin-bottom:10px"><div style="color:#8b949e;font-size:12px;margin-bottom:5px">Bot Token</div>'
      +'<input type="password" value="'+settingsForm.botToken+'" oninput="state.settingsForm.botToken=this.value" placeholder="1234567890:ABCDef..." class="field mono" style="font-size:13px"/></div>'
      +'<div style="margin-bottom:14px"><div style="color:#8b949e;font-size:12px;margin-bottom:5px">Chat ID</div>'
      +'<input type="text" value="'+settingsForm.chatId+'" oninput="state.settingsForm.chatId=this.value" placeholder="123456789" class="field mono" style="font-size:13px"/></div>'
      +'<div style="display:flex;gap:10px">'
      +'<button class="btn-secondary" onclick="testTelegram()" style="flex:1;padding:12px;font-size:14px;font-weight:600">🔬 Test Et</button>'
      +'<button class="btn-primary" onclick="saveSettings()" style="padding:12px;font-size:14px;width:auto;flex:1">💾 Kaydet</button>'
      +'</div></div>';

    h+='<div class="card"><div style="font-weight:700;font-size:15px;margin-bottom:12px">📈 İstatistikler</div>'
      +'<div class="grid2">'
      +[{l:"Toplam Rota",v:routes.length},{l:"Fiyat Noktası",v:totalPts},{l:"Telegram",v:settings.botToken?"✅ Bağlı":"❌ Yok"},{l:"Fiyat Düşüşü",v:dropCount}]
      .map(x=>'<div style="background:#0d1117;border-radius:10px;padding:12px"><div style="color:#4a5568;font-size:11px;margin-bottom:4px">'+x.l+'</div><div style="color:#e6edf3;font-weight:700;font-size:16px">'+x.v+'</div></div>').join("")
      +'</div></div>';
  }
  document.getElementById("root").innerHTML=h;
}
render();
</script>
</body>
</html>
